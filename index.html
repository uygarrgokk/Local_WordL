<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle — Hard Level Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" tabindex="-1">
    <header>
      <h1>WORDLE — Hard Level Game</h1>
      <p class="subtitle">5 harfli kelimeyi 6 denemede bul!</p>
    </header>

    <div id="message" class="message" aria-live="polite"></div>

    <div id="board" class="board" role="grid" aria-label="Tahmin tahtası"></div>

    <div id="end-panel" class="end-panel hidden">
      <p id="end-text"></p>
      <button id="play-again" class="btn" type="button">Tekrar Oyna</button>
    </div>

    <div id="keyboard" class="keyboard" role="group" aria-label="Sanal klavye"></div>

    <footer class="site-footer">Designed by Uygar GÖK</footer>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
